name: Generate Forecast

on:
  schedule:
    # Run hourly (matches HRRR availability)
    - cron: '20 * * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install herbie-data pyarrow

      - name: Download models from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p models
          gh release download v0.1.0 --dir models/ --pattern "*.pkl"
          ls -la models/

      - name: Generate forecast
        run: python -m puff_cast.forecast

      - name: Copy data for Vercel
        run: |
          mkdir -p web/public/data
          cp docs/*.json web/public/data/ 2>/dev/null || true

      - name: Commit and push results
        run: |
          git config user.name "Puff Cast Bot"
          git config user.email "puff-cast@users.noreply.github.com"
          git add docs/ data/predictions/ web/public/data/ || true
          git diff --cached --quiet || git commit -m "Forecast $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git pull --rebase origin main || true
          git push
