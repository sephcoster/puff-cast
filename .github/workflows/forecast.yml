name: Generate Forecast

on:
  schedule:
    # Run hourly (matches HRRR availability)
    - cron: '20 * * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install herbie-data pyarrow

      - name: Download models from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p models
          gh release download v0.1.0 --dir models/ --pattern "*.pkl"
          ls -la models/

      - name: Generate forecast
        run: python -m puff_cast.forecast

      - name: Copy data for web build
        run: |
          mkdir -p web/public/data
          cp docs/*.json web/public/data/ 2>/dev/null || true

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/predictions/ web/public/data/ || true
          git diff --cached --quiet || git commit -m "Forecast $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git pull --rebase origin main || true
          git push

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build static site
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: forecast
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
