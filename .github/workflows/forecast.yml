name: Generate Forecast

on:
  schedule:
    # Run every 6 hours (00, 06, 12, 18 UTC)
    - cron: '15 0,6,12,18 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install herbie-data pyarrow

      - name: Generate forecast
        run: python -m puff_cast.forecast

      - name: Commit and push results
        run: |
          git config user.name "Puff Cast Bot"
          git config user.email "puff-cast@users.noreply.github.com"
          git add docs/ data/predictions/
          git diff --cached --quiet || git commit -m "🌊 Forecast $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
